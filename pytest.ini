[pytest]
asyncio_mode = auto
testpaths = apps/api/tests apps/worker/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    integration: testes de integração (requerem serviços externos)
    unit: testes unitários (sem dependências externas)
    slow: testes lentos (downloads, processamento em lote)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
