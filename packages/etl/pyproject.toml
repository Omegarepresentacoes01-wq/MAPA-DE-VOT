[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "mapa-voto-etl"
version = "0.1.0"
description = "Pipelines de ingestão ETL — Mapa de Voto"
requires-python = ">=3.12"
dependencies = [
    "mapa-voto-shared",
    "mapa-voto-db",
    "polars>=0.20",
    "geopandas>=0.14",
    "pyogrio>=0.7",
    "shapely>=2.0",
    "pyproj>=3.6",
    "httpx>=0.27",
    "boto3>=1.34",           # MinIO/S3
    "tqdm>=4.66",
    "typer>=0.12",
    "rich>=13",
    "python-dotenv>=1.0",
    "openpyxl>=3.1",         # exportações XLSX
    "meilisearch>=0.31",     # indexação
]

[tool.setuptools.packages.find]
where = ["."]
include = ["etl*"]
