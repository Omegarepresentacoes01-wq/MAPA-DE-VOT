[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "mapa-voto-shared"
version = "0.1.0"
description = "Pydantic schemas e tipos compartilhados — Mapa de Voto"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["shared*"]
